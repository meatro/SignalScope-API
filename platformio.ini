[platformio]
src_dir = .
default_envs = lilygo-t2can

[env:lilygo-t2can]
platform = https://github.com/pioarduino/platform-espressif32.git#55.03.36
board = esp32-s3-devkitc1-n16r8
framework = arduino

monitor_speed = 115200
upload_speed = 921600

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

board_build.flash_size = 16MB
board_build.flash_mode = qio
board_build.filesystem = littlefs
board_build.partitions = partitions.csv

build_src_filter =
    -<*>
    +<main.cpp>
    +<core/*.cpp>
    +<fs/*.cpp>

lib_deps =
    autowp/autowp-mcp2515@1.3.1
    bblanchon/ArduinoJson@7.4.2

[env:diagnostic-transport-test]
extends = env:lilygo-t2can
build_src_filter =
    -<*>
    +<tests/diagnostic_transport_embedded.cpp>
    +<core/diagnostic_transport.cpp>

[env:signal-catalog-test]
extends = env:lilygo-t2can
build_src_filter =
    -<*>
    +<tests/signal_catalog_embedded.cpp>
    +<core/frame_cache.cpp>
    +<core/signal_catalog.cpp>
    +<core/signal_codec.cpp>

[env:mutation-pipeline-test]
extends = env:lilygo-t2can
build_src_filter =
    -<*>
    +<tests/mutation_pipeline_embedded.cpp>
    +<core/mutation_engine.cpp>
    +<core/rule_package.cpp>
    +<core/runtime_memory.cpp>
    +<core/runtime_tables.cpp>
    +<core/runtime_values.cpp>
    +<core/signal_codec.cpp>

[env:gateway-queue-test]
extends = env:lilygo-t2can
build_src_filter =
    -<*>
    +<tests/gateway_queue_embedded.cpp>
    +<core/*.cpp>
